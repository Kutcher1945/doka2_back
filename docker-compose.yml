services:
  db:
    container_name: cybert_db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-cybert_db}
      POSTGRES_USER: ${DB_USER:-cybert}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Cfq,thNb13}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: cybert_redis
    image: redis:7-alpine
    restart: always

  web:
    container_name: cybert_web
    build: .
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - .:/code
      - static_volume:/code/staticfiles
      - media_volume:/code/media
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  celery:
    container_name: cybert_celery
    build: .
    restart: always
    command: celery -A core worker -l info
    volumes:
      - .:/code
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume:
