version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-cybert_db}
      POSTGRES_USER: ${DB_USER:-zhancare}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  web:
    build: .
    restart: always
    command: gunicorn -c gunicorn_config.py core.wsgi
    volumes:
      - .:/code
      - static_volume:/code/staticfiles
      - media_volume:/code/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      - db
      - redis

  celery:
    build: .
    restart: always
    command: celery -A core worker -l info
    volumes:
      - .:/code
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume:
